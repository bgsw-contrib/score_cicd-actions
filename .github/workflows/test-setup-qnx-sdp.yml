name: Test Setup QNX SDP

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Fake base64-encoded license content used across all test jobs
  FAKE_LICENSE_B64: "RkFLRV9RTlhfTElDRU5TRQo=" # echo "FAKE_QNX_LICENSE" | base64

jobs:
  # ---- Scenario 1: license dir in home folder, no credential helper, no license server ----
  basic-setup:
    name: Basic setup – home dir, no credential helper, no license server
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Register cleanup verifier (post step runs after setup-qnx-sdp post)
        uses: ./.github/_internal_actions/verify-cleanup
        with:
          files-absent: ~/qnx_test_license
          env-vars-unset: QNX_CREDENTIAL_HELPER
          file-not-contains: ~/.netrc|machine qnx.com

      - name: Run setup-qnx-sdp action
        id: setup
        uses: ./setup-qnx-sdp
        with:
          qnx-license: ${{ env.FAKE_LICENSE_B64 }}
          qnx-license-dir: ~/qnx_test_license
          qnx-user: test-user
          qnx-password: test-password
          qnx-credential-helper: ""

      - name: Verify license file was created
        shell: bash
        run: |
          set -euo pipefail

          LICENSE_FILE="${HOME}/qnx_test_license/licenses"
          if [[ ! -f "${LICENSE_FILE}" ]]; then
            echo "ERROR: Expected license file not found at ${LICENSE_FILE}"
            exit 1
          fi
          echo "License file found at ${LICENSE_FILE}"
          ls -l "${LICENSE_FILE}"

      - name: Verify .netrc entry was added
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f "${HOME}/.netrc" ]]; then
            echo "ERROR: .netrc file not found"
            exit 1
          fi
          if ! grep -q "machine qnx.com" "${HOME}/.netrc"; then
            echo "ERROR: 'machine qnx.com' entry not found in .netrc"
            exit 1
          fi
          NETRC_PERMS=$(stat -c "%a" "${HOME}/.netrc")
          if [[ "${NETRC_PERMS}" != "600" ]]; then
            echo "ERROR: .netrc permissions are ${NETRC_PERMS}, expected 600"
            exit 1
          fi
          echo ".netrc entry and permissions verified"

      - name: Verify no user.bazelrc was written (no license server configured)
        shell: bash
        run: |
          set -euo pipefail

          USER_BAZELRC="${GITHUB_WORKSPACE}/user.bazelrc"
          if [[ -f "${USER_BAZELRC}" ]]; then
            if grep -q "QNXLM_LICENSE_FILE" "${USER_BAZELRC}"; then
              echo "ERROR: user.bazelrc should not contain QNXLM_LICENSE_FILE when no license server is provided"
              exit 1
            fi
          fi
          echo "user.bazelrc check passed (no license server entries present)"

  # ---- Scenario 2: with license server, .bazelrc with try-import present ----
  with-license-server:
    name: Setup with license server and .bazelrc try-import
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Register cleanup verifier (post step runs after setup-qnx-sdp post)
        uses: ./.github/_internal_actions/verify-cleanup
        with:
          files-absent: ~/qnx_test_license
          env-vars-unset: |-
            QNXLM_LICENSE_FILE
            QNX_LICENSE_EXTSERVER_DELAY
            QNX_LICENSE_QUEUE_TIMEOUT
          file-not-contains: ~/.netrc|machine qnx.com

      - name: Create .bazelrc with try-import line
        shell: bash
        run: |
          echo "try-import %workspace%/user.bazelrc" >> "${GITHUB_WORKSPACE}/.bazelrc"

      - name: Run setup-qnx-sdp action
        id: setup
        uses: ./setup-qnx-sdp
        with:
          qnx-license: ${{ env.FAKE_LICENSE_B64 }}
          qnx-license-dir: ~/qnx_test_license
          qnx-user: test-user
          qnx-password: test-password
          qnx-credential-helper: ""
          qnx-license-server: "6287@fake-license-host"

      - name: Verify license server env vars are exported
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${QNXLM_LICENSE_FILE:-}" ]]; then
            echo "ERROR: QNXLM_LICENSE_FILE env var not set"
            exit 1
          fi
          if [[ "${QNXLM_LICENSE_FILE}" != "6287@fake-license-host" ]]; then
            echo "ERROR: QNXLM_LICENSE_FILE='${QNXLM_LICENSE_FILE}', expected '6287@fake-license-host'"
            exit 1
          fi
          if [[ -z "${QNX_LICENSE_EXTSERVER_DELAY:-}" ]]; then
            echo "ERROR: QNX_LICENSE_EXTSERVER_DELAY env var not set"
            exit 1
          fi
          if [[ -z "${QNX_LICENSE_QUEUE_TIMEOUT:-}" ]]; then
            echo "ERROR: QNX_LICENSE_QUEUE_TIMEOUT env var not set"
            exit 1
          fi
          echo "License server env vars verified:"
          echo "  QNXLM_LICENSE_FILE=${QNXLM_LICENSE_FILE}"
          echo "  QNX_LICENSE_EXTSERVER_DELAY=${QNX_LICENSE_EXTSERVER_DELAY}"
          echo "  QNX_LICENSE_QUEUE_TIMEOUT=${QNX_LICENSE_QUEUE_TIMEOUT}"

      - name: Verify user.bazelrc was written with license server configuration
        shell: bash
        run: |
          set -euo pipefail

          USER_BAZELRC="${GITHUB_WORKSPACE}/user.bazelrc"
          if [[ ! -f "${USER_BAZELRC}" ]]; then
            echo "ERROR: user.bazelrc not found at ${USER_BAZELRC}"
            exit 1
          fi

          if ! grep -q "QNXLM_LICENSE_FILE=6287@fake-license-host" "${USER_BAZELRC}"; then
            echo "ERROR: user.bazelrc does not contain expected --action_env QNXLM_LICENSE_FILE entry"
            cat "${USER_BAZELRC}"
            exit 1
          fi
          if ! grep -q "QNX_LICENSE_EXTSERVER_DELAY" "${USER_BAZELRC}"; then
            echo "ERROR: user.bazelrc does not contain QNX_LICENSE_EXTSERVER_DELAY entry"
            exit 1
          fi
          if ! grep -q "QNX_LICENSE_QUEUE_TIMEOUT" "${USER_BAZELRC}"; then
            echo "ERROR: user.bazelrc does not contain QNX_LICENSE_QUEUE_TIMEOUT entry"
            exit 1
          fi
          if ! grep -q "sandbox_writable_path=/var/tmp" "${USER_BAZELRC}"; then
            echo "ERROR: user.bazelrc does not contain sandbox_writable_path entry"
            exit 1
          fi
          echo "user.bazelrc content verified:"
          cat "${USER_BAZELRC}"

  # ---- Scenario 3: missing try-import in .bazelrc produces a warning (no failure) ----
  license-server-no-try-import:
    name: Setup with license server – missing try-import (expect warning, no failure)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Register cleanup verifier (post step runs after setup-qnx-sdp post)
        uses: ./.github/_internal_actions/verify-cleanup
        with:
          files-absent: ~/qnx_test_license
          env-vars-unset: |-
            QNXLM_LICENSE_FILE
            QNX_LICENSE_EXTSERVER_DELAY
            QNX_LICENSE_QUEUE_TIMEOUT
          file-not-contains: ~/.netrc|machine qnx.com

      - name: Ensure no .bazelrc try-import line exists
        shell: bash
        run: |
          # Make sure the workspace .bazelrc does NOT contain try-import
          if [[ -f "${GITHUB_WORKSPACE}/.bazelrc" ]]; then
            sed -i '/try-import %workspace%\/user.bazelrc/d' "${GITHUB_WORKSPACE}/.bazelrc"
          fi

      - name: Run setup-qnx-sdp action (should warn, not fail)
        uses: ./setup-qnx-sdp
        with:
          qnx-license: ${{ env.FAKE_LICENSE_B64 }}
          qnx-license-dir: ~/qnx_test_license
          qnx-user: test-user
          qnx-password: test-password
          qnx-credential-helper: ""
          qnx-license-server: "6287@fake-license-host"

      - name: Verify action did not fail despite missing try-import
        shell: bash
        run: |
          echo "Action completed successfully despite missing try-import line (warning was expected)."

  # ---- Scenario 4: empty license dir is rejected with an error ----
  reject-empty-license-dir:
    name: Reject empty qnx-license-dir
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Run setup-qnx-sdp with empty license dir (expected to fail)
        id: empty-dir
        continue-on-error: true
        uses: ./setup-qnx-sdp
        with:
          qnx-license: ${{ env.FAKE_LICENSE_B64 }}
          qnx-license-dir: "   "
          qnx-user: test-user
          qnx-password: test-password
          qnx-credential-helper: ""

      - name: Verify action failed for empty license dir
        shell: bash
        env:
          OUTCOME: ${{ steps.empty-dir.outcome }}
        run: |
          set -euo pipefail
          if [[ "${OUTCOME}" != "failure" ]]; then
            echo "ERROR: Expected action to fail for empty 'qnx-license-dir', but outcome was '${OUTCOME}'"
            exit 1
          fi
          echo "Correctly rejected empty 'qnx-license-dir' (outcome: ${OUTCOME})"

  # ---- Scenario 5: single-level absolute path is rejected with an error ----
  reject-shallow-license-dir:
    name: Reject too-shallow absolute qnx-license-dir
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Run setup-qnx-sdp with single-level absolute path (expected to fail)
        id: shallow-dir
        continue-on-error: true
        uses: ./setup-qnx-sdp
        with:
          qnx-license: ${{ env.FAKE_LICENSE_B64 }}
          qnx-license-dir: /qnx
          qnx-user: test-user
          qnx-password: test-password
          qnx-credential-helper: ""

      - name: Verify action failed for too-shallow license dir
        shell: bash
        env:
          OUTCOME: ${{ steps.shallow-dir.outcome }}
        run: |
          set -euo pipefail
          if [[ "${OUTCOME}" != "failure" ]]; then
            echo "ERROR: Expected action to fail for single-level 'qnx-license-dir' '/qnx', but outcome was '${OUTCOME}'"
            exit 1
          fi
          echo "Correctly rejected single-level absolute 'qnx-license-dir' (outcome: ${OUTCOME})"

  # ---- Scenario 6: credential helper points to an existing file ----
  credential-helper-existing-file:
    name: Credential helper – existing file
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Register cleanup verifier (post step runs after setup-qnx-sdp post)
        uses: ./.github/_internal_actions/verify-cleanup
        with:
          files-absent: ~/qnx_test_license
          env-vars-unset: QNX_CREDENTIAL_HELPER
          file-not-contains: ~/.netrc|machine qnx.com

      - name: Create a fake credential helper script
        shell: bash
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/.github/tools"
          echo '#!/usr/bin/env python3' > "${GITHUB_WORKSPACE}/.github/tools/qnx_credential_helper.py"
          chmod +x "${GITHUB_WORKSPACE}/.github/tools/qnx_credential_helper.py"

      - name: Run setup-qnx-sdp with existing credential helper
        id: setup
        uses: ./setup-qnx-sdp
        with:
          qnx-license: ${{ env.FAKE_LICENSE_B64 }}
          qnx-license-dir: ~/qnx_test_license
          qnx-user: test-user
          qnx-password: test-password
          # Do not set qnx-credential-helper in order to test that default value ".github/tools/qnx_credential_helper.py" is properly used

      - name: Verify QNX_CREDENTIAL_HELPER env var is set
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${QNX_CREDENTIAL_HELPER:-}" ]]; then
            echo "ERROR: QNX_CREDENTIAL_HELPER env var not set"
            exit 1
          fi
          if [[ ! -f "${QNX_CREDENTIAL_HELPER}" ]]; then
            echo "ERROR: QNX_CREDENTIAL_HELPER='${QNX_CREDENTIAL_HELPER}' does not point to an existing file"
            exit 1
          fi
          echo "QNX_CREDENTIAL_HELPER set and points to an existing file: ${QNX_CREDENTIAL_HELPER}"

  # ---- Scenario 7: credential helper points to a non-existent file ----
  credential-helper-missing-file:
    name: Credential helper – non-existent file (expect failure)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2

      - name: Run setup-qnx-sdp with non-existent credential helper (expected to fail)
        id: missing-helper
        continue-on-error: true
        uses: ./setup-qnx-sdp
        with:
          qnx-license: ${{ env.FAKE_LICENSE_B64 }}
          qnx-license-dir: ~/qnx_test_license
          qnx-user: test-user
          qnx-password: test-password
          qnx-credential-helper: ".github/tools/does_not_exist.py"

      - name: Verify action failed for missing credential helper
        shell: bash
        env:
          OUTCOME: ${{ steps.missing-helper.outcome }}
        run: |
          set -euo pipefail
          if [[ "${OUTCOME}" != "failure" ]]; then
            echo "ERROR: Expected action to fail for non-existent credential helper, but outcome was '${OUTCOME}'"
            exit 1
          fi
          echo "Correctly rejected non-existent credential helper (outcome: ${OUTCOME})"
